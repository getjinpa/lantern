<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Lamp base (cup) -->
  <path d="M20 52 Q20 56 32 56 Q44 56 44 52 L42 42 Q42 40 32 40 Q22 40 22 42 Z"
        fill="#7B2D3A" />
  <!-- Lamp body detail -->
  <path d="M22 42 Q22 40 32 40 Q42 40 42 42"
        stroke="#D4A843" stroke-width="1.5" fill="none" stroke-linecap="round" />
  <!-- Lamp stem -->
  <rect x="30" y="38" width="4" height="6" rx="1" fill="#7B2D3A" />
  <!-- Oil bowl rim -->
  <ellipse cx="32" cy="38" rx="10" ry="3" fill="#C8892A" />
  <!-- Flame outer glow -->
  <ellipse cx="32" cy="24" rx="9" ry="13" fill="#D4A843" opacity="0.25" />
  <!-- Flame main -->
  <path d="M32 10 C28 18 24 22 26 30 C27 34 32 36 32 36 C32 36 37 34 38 30 C40 22 36 18 32 10 Z"
        fill="url(#flameGrad)" />
  <!-- Flame inner highlight -->
  <path d="M32 16 C30 21 28 24 29 28 C30 31 32 33 32 33 C32 33 34 31 35 28 C36 24 34 21 32 16 Z"
        fill="#FAEBC0" opacity="0.7" />
  <!-- Wick dot -->
  <circle cx="32" cy="36" r="1.5" fill="#5E2030" />
  <!-- Decorative dots around base -->
  <circle cx="20" cy="49" r="1.2" fill="#D4A843" opacity="0.6" />
  <circle cx="44" cy="49" r="1.2" fill="#D4A843" opacity="0.6" />
  <defs>
    <linearGradient id="flameGrad" x1="32" y1="10" x2="32" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FAEBC0" />
      <stop offset="40%" stop-color="#D4A843" />
      <stop offset="80%" stop-color="#C8892A" />
      <stop offset="100%" stop-color="#7B2D3A" />
    </linearGradient>
  </defs>
</svg>
